<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - SMK 4 Kendari</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #131314; color: #e3e3e3; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header */
        header { padding: 15px 20px; font-weight: 500; color: #8e918f; border-bottom: 1px solid #444746; font-size: 14px; }

        /* Area Chat */
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 24px; }
        .msg { max-width: 85%; line-height: 1.6; font-size: 15px; position: relative; }
        
        /* Gaya Balon Chat User */
        .user { align-self: flex-end; background: #004a77; color: #e3e3e3; padding: 12px 20px; border-radius: 18px 18px 2px 18px; }
        
        /* Gaya Balon Chat AI */
        .ai { align-self: flex-start; background: transparent; padding: 0; border-radius: 0; max-width: 90%; }
        .ai-content { display: flex; gap: 12px; }
        .ai-icon { width: 30px; height: 30px; background: linear-gradient(45deg, #4285f4, #9b72cb, #d96570); border-radius: 50%; flex-shrink: 0; }

        /* Container Input (Kolom Pesan di Bawah) */
        .input-container { padding: 20px; background: #131314; }
        .input-wrapper { 
            max-width: 800px; margin: 0 auto; display: flex; align-items: center; 
            background: #1e1f20; border-radius: 28px; padding: 8px 16px; border: 1px solid #444746;
        }
        input { 
            flex: 1; background: transparent; border: none; color: #e3e3e3; 
            padding: 12px; font-size: 16px; outline: none; 
        }
        button { 
            background: transparent; border: none; color: #a8c7fa; 
            cursor: pointer; padding: 8px; font-size: 20px; font-weight: bold;
        }
        button:disabled { color: #444746; }

        .status { font-size: 12px; color: #8e918f; text-align: center; margin-top: 8px; }
    </style>
</head>
<body>

<header>Gemini RPL Edition</header>

<div id="chatBox">
    <div class="msg ai">
        <div class="ai-content">
            <div class="ai-icon"></div>
            <div>Halo! Ada yang bisa dibantu soal kodingan atau tugas SMK hari ini?</div>
        </div>
    </div>
</div>

<div class="input-container">
    <div class="input-wrapper">
        <input type="text" id="userInput" placeholder="Ketik pesan di sini..." autocomplete="off">
        <button id="sendBtn" onclick="mulaiKirim()">&#10148;</button>
    </div>
    <div class="status" id="statusLine">Status: Siap</div>
</div>

<script>
    // API KEY BARU LO YANG FRESH
    const MY_KEY = "AIzaSyC36lu9NtugxCNp01HB8lDsGEyxjs5zE08";
    
    const chatBox = document.getElementById('chatBox');
    const statusLine = document.getElementById('statusLine');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');

    function addChat(role, text) {
        const div = document.createElement('div');
        div.className = 'msg ' + role;
        
        if (role === 'ai') {
            div.innerHTML = `<div class="ai-content"><div class="ai-icon"></div><div>${text}</div></div>`;
        } else {
            div.innerText = text;
        }
        
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function mulaiKirim() {
        const pesan = input.value.trim();
        if (!pesan) return;

        addChat('user', pesan);
        input.value = '';
        btn.disabled = true;
        statusLine.innerText = "Status: Berpikir...";

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MY_KEY}`;

        try {
            const respon = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Jawab dengan asik, gaul, pinter koding, dan jangan sebut nama user. Pesan: " + pesan }] }]
                })
            });

            const data = await respon.json();
            
            if (data.candidates) {
                const balasan = data.candidates[0].content.parts[0].text;
                addChat('ai', balasan);
            } else {
                addChat('ai', "Waduh, ada kendala koneksi ke pusat. Coba lagi, Gi!");
            }
        } catch (err) {
            addChat('ai', "Error koneksi. Cek kuota lo!");
        } finally {
            btn.disabled = false;
            statusLine.innerText = "Status: Siap";
        }
    }

    input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") mulaiKirim();
    });
</script>

</body>
</html>
