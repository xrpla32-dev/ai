<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #131314; color: #e3e3e3; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px 20px; font-weight: 500; color: #8e918f; border-bottom: 1px solid #444746; font-size: 14px; text-align: right; }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 24px; }
        .msg { max-width: 85%; line-height: 1.6; font-size: 15px; }
        .user { align-self: flex-end; background: #004a77; padding: 12px 20px; border-radius: 18px 18px 2px 18px; }
        .ai { align-self: flex-start; display: flex; gap: 12px; }
        .ai-icon { width: 30px; height: 30px; background: linear-gradient(45deg, #4285f4, #9b72cb, #d96570); border-radius: 50%; flex-shrink: 0; }
        .input-container { padding: 20px; background: #131314; }
        .input-wrapper { max-width: 800px; margin: 0 auto; display: flex; align-items: center; background: #1e1f20; border-radius: 28px; padding: 8px 16px; border: 1px solid #444746; }
        input { flex: 1; background: transparent; border: none; color: #e3e3e3; padding: 12px; font-size: 16px; outline: none; }
        button { background: transparent; border: none; color: #a8c7fa; cursor: pointer; padding: 8px; font-size: 20px; }
        .status { font-size: 12px; color: #8e918f; text-align: center; margin-top: 8px; }
    </style>
</head>
<body>

<header>AI ASISTEN RPL</header>
<div id="chatBox">
    <div class="ai"><div class="ai-icon"></div><div>Halo! Ada yang bisa dibantu soal kodingan hari ini?</div></div>
</div>

<div class="input-container">
    <div class="input-wrapper">
        <input type="text" id="userInput" placeholder="Ketik pesan di sini..." autocomplete="off">
        <button id="sendBtn" onclick="mulaiKirim()">&#10148;</button>
    </div>
    <div class="status" id="statusLine">Status: Siap</div>
</div>

<script>
    // 1. KUNCI TERBARU LO (SUDAH FIX 00 BUKAN OO)
    const MY_KEY = "AIzaSyC36lu9NtugxCNp01HB8lDsGEyxjs5zE08";
    
    const chatBox = document.getElementById('chatBox');
    const statusLine = document.getElementById('statusLine');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');

    function addChat(role, text) {
        const div = document.createElement('div');
        div.className = role;
        if (role === 'ai') {
            div.innerHTML = `<div class="ai-icon"></div><div>${text}</div>`;
        } else {
            div.className = 'msg user';
            div.innerText = text;
        }
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function mulaiKirim() {
        const pesan = input.value.trim();
        if (!pesan) return;

        addChat('user', pesan);
        input.value = '';
        btn.disabled = true;
        statusLine.innerText = "Status: Menghubungi Google...";

        // PAKAI MODEL 1.5 FLASH (VERSI TERBARU & STABIL)
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MY_KEY}`;

        try {
            const respon = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "Gaya bicara gaul SMK Kendari, jangan panggil nama user: " + pesan }] }]
                })
            });

            const data = await respon.json();
            
            if (data.candidates && data.candidates[0].content) {
                const balasan = data.candidates[0].content.parts[0].text;
                addChat('ai', balasan);
            } else if (data.error) {
                addChat('ai', "Google Bilang: " + data.error.message);
            } else {
                addChat('ai', "Respon aneh, Gi. Cek API Studio!");
            }
        } catch (err) {
            addChat('ai', "Gagal total! Cek kuota atau sinyal lo.");
        } finally {
            btn.disabled = false;
            statusLine.innerText = "Status: Siap";
        }
    }
    input.addEventListener("keypress", (e) => { if (e.key === "Enter") mulaiKirim(); });
</script>
</body>
</html>
