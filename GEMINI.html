<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asisten Digital RPL</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #131314; color: #e3e3e3; height: 100vh; display: flex; flex-direction: column; }
        
        /* Header */
        header { padding: 15px; background: #1e1f20; border-bottom: 1px solid #444746; text-align: center; font-size: 14px; font-weight: bold; color: #a8c7fa; }

        /* Area Chat */
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 100px; }
        .msg { max-width: 85%; line-height: 1.6; font-size: 15px; }
        .user { align-self: flex-end; background: #004a77; padding: 10px 15px; border-radius: 18px 18px 2px 18px; }
        .ai { align-self: flex-start; display: flex; gap: 10px; }
        .ai-icon { width: 28px; height: 28px; background: #4285f4; border-radius: 50%; flex-shrink: 0; }

        /* Area Input - DIKUNCI DI BAWAH */
        .input-fixed { position: fixed; bottom: 0; left: 0; right: 0; background: #131314; padding: 15px; border-top: 1px solid #444746; }
        .input-wrapper { max-width: 600px; margin: 0 auto; display: flex; background: #1e1f20; border-radius: 30px; border: 1px solid #444746; padding: 5px 15px; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; font-size: 16px; outline: none; }
        button { background: transparent; border: none; color: #a8c7fa; font-size: 22px; cursor: pointer; padding-left: 10px; }
        
        .status-txt { font-size: 10px; color: #8e918f; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<header>ASISTEN PROFESIONAL RPL</header>

<div id="chatBox">
    <div class="ai"><div class="ai-icon"></div><div>Sistem siap. Ada yang bisa saya bantu terkait tugas atau kodingan Anda?</div></div>
</div>

<div class="input-fixed">
    <div class="input-wrapper">
        <input type="text" id="userInput" placeholder="Tanyakan sesuatu..." autocomplete="off">
        <button id="sendBtn" onclick="kirim()">&#10148;</button>
    </div>
    <div class="status-txt" id="stts">Status: Siap</div>
</div>

<script>
    const API_KEY = "AIzaSyC36lu9NtugxCNp01HB8lDsGEyxjs5zE08";
    const box = document.getElementById('chatBox');
    const inp = document.getElementById('userInput');
    const st = document.getElementById('stts');

    function add(role, txt) {
        const d = document.createElement('div');
        d.className = (role === 'ai') ? 'ai' : 'msg user';
        d.innerHTML = (role === 'ai') ? `<div class="ai-icon"></div><div>${txt}</div>` : txt;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    async function kirim() {
        const p = inp.value.trim();
        if(!p) return;
        
        add('user', p);
        inp.value = '';
        st.innerText = "Status: Berpikir...";

        // Alamat v1 agar tidak error "Not Found"
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        try {
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Jawab dengan profesional, singkat, dan jangan panggil nama user: " + p }] }] })
            });
            const data = await res.json();
            if(data.candidates) {
                add('ai', data.candidates[0].content.parts[0].text);
            } else {
                add('ai', "Gagal: " + (data.error ? data.error.message : "Cek API Key"));
            }
        } catch(e) {
            add('ai', "Koneksi terputus.");
        } finally {
            st.innerText = "Status: Siap";
        }
    }
    inp.addEventListener("keypress", (e) => { if(e.key === "Enter") kirim(); });
</script>
</body>
</html>
